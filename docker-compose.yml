services:
  db:
    image: postgres:18-alpine
    container_name: apt-orders-db
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_DB: orders_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./db/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
